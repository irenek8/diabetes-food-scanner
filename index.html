<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Diabetes Food Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-green-50 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-white rounded-2xl shadow-md w-full max-w-md p-8">

      <h1 class="text-2xl font-bold text-green-700 text-center mb-2">
        🍎 Diabetes Food Scanner
      </h1>
      <p class="text-gray-500 text-center text-sm mb-6">
        Take a photo of any food to see how it may affect your blood sugar.
      </p>

      <input
        type="file"
        accept="image/*"
        capture="environment"
        id="foodImage"
        class="block w-full text-sm text-gray-500 mb-4
               file:mr-4 file:py-2 file:px-4
               file:rounded-full file:border-0
               file:text-sm file:font-semibold
               file:bg-green-100 file:text-green-700
               hover:file:bg-green-200"
      />

      <button
        onclick="analyzeFood()"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-xl transition">
        Analyze Food
      </button>

      <div id="result" class="mt-6 text-gray-700 text-sm leading-relaxed hidden">
        <div id="loading" class="text-center text-green-600 font-medium">
          Analyzing your food...
        </div>
        <div id="output" class="hidden"></div>
      </div>

    </div>

  </body>
</html>
