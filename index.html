<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Diabetes Food Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-green-50 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-white rounded-2xl shadow-md w-full max-w-md p-8">

      <h1 class="text-2xl font-bold text-green-700 text-center mb-2">
        🍎 Food Scanner 🍎
      </h1>
      <p class="text-gray-500 text-center text-sm mb-6">
        Take a photo of any food to see how it may affect your blood sugar.
      </p>

      <!-- API Key input -->
      <input
        type="password"
        id="apiKey"
        placeholder="Paste your Gemini API key here"
        class="block w-full text-sm border border-gray-200 rounded-xl px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-green-300"
      />

      <!-- Image upload -->
      <input
        type="file"
        accept="image/*"
        capture="environment"
        id="foodImage"
        class="block w-full text-sm text-gray-500 mb-4
               file:mr-4 file:py-2 file:px-4
               file:rounded-full file:border-0
               file:text-sm file:font-semibold
               file:bg-green-100 file:text-green-700
               hover:file:bg-green-200"
      />

      <!-- Preview of selected image -->
      <img
        id="preview"
        class="hidden w-full rounded-xl mb-4 object-cover max-h-48"
      />

      <!-- Analyze button -->
      <button
        onclick="analyzeFood()"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-xl transition">
        Analyze Food
      </button>

      <!-- Result area -->
      <div id="result" class="mt-6 text-gray-700 text-sm leading-relaxed hidden">
        <div id="loading" class="text-center text-green-600 font-medium">
          Analyzing your food... 🔍
        </div>
        <div id="output" class="hidden whitespace-pre-wrap"></div>
      </div>

    </div>

    <script>
      // Show a preview of the image when selected
      document.getElementById('foodImage').addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          const preview = document.getElementById('preview');
          preview.src = e.target.result;
          preview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      });

      async function analyzeFood() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const fileInput = document.getElementById('foodImage');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const outputDiv = document.getElementById('output');

        // Basic checks
        if (!apiKey) {
          alert('Please paste your Gemini API key first.');
          return;
        }
        if (!fileInput.files[0]) {
          alert('Please select or take a photo of a food item first.');
          return;
        }

        // Show loading state
        resultDiv.classList.remove('hidden');
        loadingDiv.classList.remove('hidden');
        outputDiv.classList.add('hidden');
        outputDiv.textContent = '';

        // Convert image to base64
        const file = fileInput.files[0];
        const base64Image = await toBase64(file);
        const mimeType = file.type;

        // The prompt sent to Gemini
        const prompt = `You are a helpful assistant for people managing diabetes. 
Analyze this food image and provide the following in a clear, friendly format:

1. 🍽️ Food identified
2. 📊 Estimated glycemic index (low/medium/high) and what that means
3. 📈 How much this food is likely to spike blood glucose levels
4. ⚖️ Recommended portion size for a diabetic
5. ✅ Whether it is safe to eat, should be eaten in moderation, or avoided
6. 🥦 2-3 healthier alternatives with lower glycemic impact

Keep the response concise and easy to understand for someone without a medical background.`;

        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{
                  parts: [
                    { text: prompt },
                    {
                      inline_data: {
                        mime_type: mimeType,
                        data: base64Image
                      }
                    }
                  ]
                }]
              })
            }
          );

          const data = await response.json();

          if (data.error) {
            outputDiv.textContent = '❌ Error: ' + data.error.message;
          } else {
            outputDiv.textContent =
              data.candidates[0].content.parts[0].text;
          }
        } catch (err) {
          outputDiv.textContent = '❌ Something went wrong. Check your API key and try again.';
        }

        // Hide loading, show result
        loadingDiv.classList.add('hidden');
        outputDiv.classList.remove('hidden');
      }

      // Helper: convert file to base64
      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }
    </script>

  </body>
</html>
